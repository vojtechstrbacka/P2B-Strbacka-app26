<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshBowl – Čerstvá energie v každé misce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Fraunces:ital,wght@1,500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --green:#4CAF50;
      --green-dark:#3d9142;
      --orange:#FF9800;
      --orange-dark:#f57c00;
      --white:#FFFFFF;
      --light:#F5F5F5;
      --dark:#333333;
      --radius:18px;
      --shadow:0 10px 30px rgba(51,51,51,.10);
      --shadow-sm:0 4px 14px rgba(51,51,51,.08);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Outfit',sans-serif;
      color:var(--dark);
      background:var(--light);
      line-height:1.55;
    }

    /* ---------- HLAVIČKA ---------- */
    header{
      background:linear-gradient(120deg,var(--green) 0%,#67c25e 45%,var(--orange) 100%);
      color:var(--white);
      padding:46px 20px 56px;
      text-align:center;
      position:relative;
      overflow:hidden;
    }
    header::after{
      content:"";position:absolute;left:0;right:0;bottom:-1px;height:40px;
      background:var(--light);
      border-radius:50% 50% 0 0/100% 100% 0 0;
    }
    .brand{
      display:flex;align-items:center;justify-content:center;gap:14px;
    }
    .logo{width:58px;height:58px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.18))}
    .brand h1{
      font-family:'Bricolage Grotesque',sans-serif;
      font-weight:800;font-size:2.9rem;letter-spacing:-.5px;
    }
    .brand h1 span{color:#fff5e6}
    .slogan{
      font-family:'Fraunces',serif;font-style:italic;
      font-size:1.25rem;margin-top:8px;opacity:.95;
    }

    /* ---------- OBSAH ---------- */
    main{max-width:1080px;margin:0 auto;padding:10px 20px 60px}
    .section-title{
      font-family:'Bricolage Grotesque',sans-serif;font-weight:700;
      font-size:1.7rem;margin:26px 0 18px;color:var(--dark);
    }
    .section-title small{
      display:block;font-family:'Outfit';font-weight:400;font-size:.95rem;
      color:#777;margin-top:2px;
    }

    /* ---------- KARTY PRODUKTŮ ---------- */
    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
      gap:22px;
    }
    .card{
      background:var(--white);border-radius:var(--radius);
      box-shadow:var(--shadow-sm);overflow:hidden;
      display:flex;flex-direction:column;
      transition:transform .25s ease,box-shadow .25s ease;
      opacity:0;transform:translateY(16px);
      animation:rise .5s ease forwards;
    }
    @keyframes rise{to{opacity:1;transform:translateY(0)}}
    .card:hover{transform:translateY(-6px);box-shadow:var(--shadow)}
    .card img{width:100%;aspect-ratio:1/1;object-fit:cover;background:#FAFAF7}
    .card-body{padding:16px 18px 18px;display:flex;flex-direction:column;flex:1}
    .card-body h3{font-family:'Bricolage Grotesque',sans-serif;font-size:1.2rem;font-weight:700}
    .card-body p{font-size:.9rem;color:#666;margin:6px 0 14px;flex:1}
    .price{
      font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
      font-size:1.35rem;color:var(--green-dark);margin-bottom:12px;
    }
    .price small{font-size:.8rem;font-weight:600;color:#999}
    .stepper{display:flex;align-items:center;gap:10px}
    .stepper button{
      width:38px;height:38px;border:none;border-radius:12px;
      background:var(--light);color:var(--dark);font-size:1.3rem;cursor:pointer;
      transition:background .15s,transform .15s;
    }
    .stepper button:hover{background:#e8e8e8;transform:scale(1.08)}
    .stepper button.plus{background:var(--green);color:#fff}
    .stepper button.plus:hover{background:var(--green-dark)}
    .stepper input{
      width:54px;height:38px;text-align:center;border:2px solid #eee;
      border-radius:10px;font-family:'Outfit';font-size:1rem;font-weight:600;
    }
    .stepper input::-webkit-outer-spin-button,
    .stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

    /* ---------- SPODNÍ ČÁST: FORMULÁŘ + SOUHRN ---------- */
    .order-area{
      display:grid;grid-template-columns:1.4fr 1fr;gap:24px;margin-top:14px;align-items:start;
    }
    .panel{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:24px}
    .panel h2{font-family:'Bricolage Grotesque',sans-serif;font-size:1.35rem;margin-bottom:16px}
    .field{margin-bottom:14px}
    .field label{display:block;font-weight:500;font-size:.92rem;margin-bottom:5px}
    .field label .req{color:var(--orange-dark)}
    .field input{
      width:100%;padding:12px 14px;border:2px solid #eee;border-radius:12px;
      font-family:'Outfit';font-size:1rem;transition:border-color .15s;
    }
    .field input:focus{outline:none;border-color:var(--green)}
    .field input.invalid{border-color:#e2493b;background:#fff6f5}

    /* souhrn */
    .summary{position:sticky;top:18px}
    .summary-lines{margin-bottom:14px;min-height:24px}
    .summary-lines .empty{color:#999;font-size:.9rem}
    .summary-lines .line{
      display:flex;justify-content:space-between;font-size:.95rem;padding:5px 0;
      border-bottom:1px dashed #eee;
    }
    .summary-lines .line span:last-child{font-weight:600}
    .totals{border-top:2px solid var(--light);padding-top:14px;margin-top:6px}
    .totals .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
    .totals .row .label{color:#666}
    .totals .grand{
      font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.6rem;color:var(--green-dark);
    }
    .send-btn{
      width:100%;margin-top:18px;padding:16px;border:none;border-radius:14px;
      background:var(--orange);color:#fff;font-family:'Bricolage Grotesque',sans-serif;
      font-weight:700;font-size:1.1rem;cursor:pointer;
      transition:transform .18s ease,background .18s ease,box-shadow .18s ease;
      box-shadow:0 6px 18px rgba(255,152,0,.35);
    }
    .send-btn:hover{transform:scale(1.04);background:var(--orange-dark)}
    .send-btn:active{transform:scale(.99)}
    .msg{margin-top:14px;padding:12px 14px;border-radius:12px;font-size:.92rem;display:none}
    .msg.error{display:block;background:#fff0ee;color:#c0392b;border:1px solid #f3c6bf}
    .msg.success{display:block;background:#eef9ee;color:#2e7d32;border:1px solid #c3e6c4}

    footer{text-align:center;padding:26px 20px 36px;color:#999;font-size:.88rem}
    footer strong{color:var(--green-dark)}

    @media (max-width:820px){
      .order-area{grid-template-columns:1fr}
      .summary{position:static}
      .brand h1{font-size:2.2rem}
      .logo{width:46px;height:46px}
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <!-- LOGO (inline SVG) -->
      <svg class="logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-label="Logo FreshBowl">
        <circle cx="24" cy="24" r="23" fill="#ffffff"/>
        <path d="M10 25 a14 9 0 0 0 28 0 Z" fill="#FF9800"/>
        <path d="M10 25 a14 4 0 0 0 28 0 Z" fill="#f57c00"/>
        <path d="M24 23 C20 13 26 7 33 9 C33 17 30 22 24 23 Z" fill="#4CAF50"/>
        <path d="M24 23 C26 16 29 12 32 11" stroke="#3d9142" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <circle cx="18" cy="22" r="2" fill="#e2493b"/>
        <circle cx="30" cy="22" r="1.6" fill="#f6c945"/>
      </svg>
      <h1>Fresh<span>Bowl</span></h1>
    </div>
    <p class="slogan">„Čerstvá energie v každé misce"</p>
  </header>

  <main>
    <h2 class="section-title">Naše menu
      <small>Vyber si misku, zadej počet kusů a sleduj cenu napravo</small>
    </h2>

    <section class="products" id="products">
      <!-- karty se vykreslí z produkty.csv pomocí JavaScriptu -->
    </section>

    <div class="order-area">
      <!-- FORMULÁŘ -->
      <div class="panel">
        <h2>Vaše údaje</h2>
        <div class="field">
          <label for="jmeno">Jméno <span class="req">*</span></label>
          <input type="text" id="jmeno" autocomplete="given-name">
        </div>
        <div class="field">
          <label for="prijmeni">Příjmení <span class="req">*</span></label>
          <input type="text" id="prijmeni" autocomplete="family-name">
        </div>
        <div class="field">
          <label for="email">E-mail <span class="req">*</span></label>
          <input type="email" id="email" autocomplete="email" placeholder="jmeno@email.cz">
        </div>
        <div class="field">
          <label for="telefon">Telefon <span class="req">*</span></label>
          <input type="tel" id="telefon" autocomplete="tel" placeholder="+420 777 123 456">
        </div>
      </div>

      <!-- SOUHRN -->
      <div class="panel summary">
        <h2>Souhrn objednávky</h2>
        <div class="summary-lines" id="summaryLines">
          <div class="empty">Zatím jsi nic nevybral(a).</div>
        </div>
        <div class="totals">
          <div class="row"><span class="label">Počet kusů:</span><span id="totalQty">0</span></div>
          <div class="row"><span class="label">Celková cena:</span><span class="grand" id="totalPrice">0 Kč</span></div>
        </div>
        <button class="send-btn" id="sendBtn">ODESLAT OBJEDNÁVKU</button>
        <div class="msg" id="msg"></div>
      </div>
    </div>
  </main>

  <footer>
    <strong>FreshBowl</strong> &copy; 2026 &middot; Studentská firma &middot; Čerstvá energie v každé misce
  </footer>

  <script>
    const ORDER_EMAIL = "app@kostka-skola.cz";
    let products = [];          // načtené produkty z CSV
    const quantities = {};      // počty kusů { index: qty }

    /* ---------- 1) Načtení produktů z CSV ---------- */
    async function loadProducts(){
      try{
        const res = await fetch('produkty.csv');
        if(!res.ok) throw new Error('CSV se nepodařilo načíst');
        const text = await res.text();
        products = parseCSV(text);
        renderProducts();
        updateSummary();
      }catch(err){
        document.getElementById('products').innerHTML =
          '<p style="color:#c0392b">Produkty se nepodařilo načíst. ' +
          'Aplikaci spusť přes GitHub Pages (online), ne otevřením souboru z disku.</p>';
        console.error(err);
      }
    }

    function parseCSV(text){
      const rows = text.trim().split(/\r?\n/);
      rows.shift(); // odstraní hlavičku
      return rows.filter(r => r.trim() !== '').map(row => {
        const [nazev, cena, obrazek, popis] = row.split(';');
        return { nazev:nazev.trim(), cena:parseInt(cena,10),
                 obrazek:obrazek.trim(), popis:(popis||'').trim() };
      });
    }

    /* ---------- 2) Vykreslení karet ---------- */
    function renderProducts(){
      const wrap = document.getElementById('products');
      wrap.innerHTML = '';
      products.forEach((p,i) => {
        quantities[i] = 0;
        const card = document.createElement('div');
        card.className = 'card';
        card.style.animationDelay = (i*0.08)+'s';
        card.innerHTML = `
          <img src="${p.obrazek}" alt="${p.nazev}">
          <div class="card-body">
            <h3>${p.nazev}</h3>
            <p>${p.popis}</p>
            <div class="price">${p.cena} Kč <small>/ ks</small></div>
            <div class="stepper">
              <button type="button" onclick="changeQty(${i},-1)">−</button>
              <input type="number" min="0" value="0" id="qty${i}"
                     onchange="setQty(${i}, this.value)">
              <button type="button" class="plus" onclick="changeQty(${i},1)">+</button>
            </div>
          </div>`;
        wrap.appendChild(card);
      });
    }

    /* ---------- 3) Změna počtu kusů ---------- */
    function changeQty(i, delta){
      quantities[i] = Math.max(0, (quantities[i]||0) + delta);
      document.getElementById('qty'+i).value = quantities[i];
      updateSummary();
    }
    function setQty(i, val){
      let n = parseInt(val,10);
      if(isNaN(n) || n < 0) n = 0;
      quantities[i] = n;
      document.getElementById('qty'+i).value = n;
      updateSummary();
    }

    /* ---------- 4) Přepočet souhrnu ---------- */
    function updateSummary(){
      const lines = document.getElementById('summaryLines');
      let totalQty = 0, totalPrice = 0, html = '';
      products.forEach((p,i) => {
        const q = quantities[i] || 0;
        if(q > 0){
          const sub = q * p.cena;
          totalQty += q; totalPrice += sub;
          html += `<div class="line"><span>${p.nazev} × ${q}</span><span>${sub} Kč</span></div>`;
        }
      });
      lines.innerHTML = html || '<div class="empty">Zatím jsi nic nevybral(a).</div>';
      document.getElementById('totalQty').textContent = totalQty;
      document.getElementById('totalPrice').textContent = totalPrice + ' Kč';
    }

    /* ---------- 5) Odeslání objednávky ---------- */
    document.getElementById('sendBtn').addEventListener('click', sendOrder);

    function sendOrder(){
      const msg = document.getElementById('msg');
      const jmeno = val('jmeno'), prijmeni = val('prijmeni'),
            email = val('email'), telefon = val('telefon');

      // reset zvýraznění
      ['jmeno','prijmeni','email','telefon'].forEach(id =>
        document.getElementById(id).classList.remove('invalid'));

      // a) je něco objednáno?
      const items = products
        .map((p,i)=>({...p, q:quantities[i]||0}))
        .filter(x=>x.q>0);
      if(items.length === 0){
        return showMsg('error','Nejprve si vyber alespoň jeden produkt. 🥗');
      }

      // b) vyplněná pole
      let bad = [];
      if(!jmeno) bad.push('jmeno');
      if(!prijmeni) bad.push('prijmeni');
      if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ bad.push('email'); }
      if(telefon.replace(/[^0-9]/g,'').length < 9){ bad.push('telefon'); }
      if(bad.length){
        bad.forEach(id=>document.getElementById(id).classList.add('invalid'));
        return showMsg('error','Zkontroluj prosím vyplněné údaje (jméno, příjmení, platný e-mail a telefon).');
      }

      // c) sestavení a odeslání e-mailu
      let totalQty = 0, totalPrice = 0, body = 'Dobrý den,\n\nráda/rád bych si objednal(a) následující:\n\n';
      items.forEach(x => {
        const sub = x.q * x.cena;
        totalQty += x.q; totalPrice += sub;
        body += `- ${x.nazev} × ${x.q} ks = ${sub} Kč\n`;
      });
      body += `\nCelkem kusů: ${totalQty}\nCelková cena: ${totalPrice} Kč\n\n`;
      body += `Kontaktní údaje:\nJméno a příjmení: ${jmeno} ${prijmeni}\nE-mail: ${email}\nTelefon: ${telefon}\n\nDěkuji!`;

      const href = 'mailto:' + ORDER_EMAIL +
        '?subject=' + encodeURIComponent('Objednávka FreshBowl – ' + jmeno + ' ' + prijmeni) +
        '&body=' + encodeURIComponent(body);
      window.location.href = href;

      showMsg('success','Otevírá se tvůj e-mailový klient s hotovou objednávkou – stačí ji odeslat. ✅');
    }

    function val(id){ return document.getElementById(id).value.trim(); }
    function showMsg(type, text){
      const m = document.getElementById('msg');
      m.className = 'msg ' + type;
      m.textContent = text;
    }

    /* start */
    loadProducts();
  </script>
</body>
</html>
