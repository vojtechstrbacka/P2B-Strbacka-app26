<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Chicken Bowl">
  <rect width="400" height="400" fill="#FAFAF7"/>
  <ellipse cx="200" cy="322" rx="118" ry="20" fill="#000" opacity="0.06"/>
  <!-- bowl body -->
  <path d="M84 200 Q200 358 316 200 Z" fill="#ffffff" stroke="#e6e2d8" stroke-width="3"/>
  <ellipse cx="200" cy="200" rx="116" ry="26" fill="#ffffff" stroke="#e6e2d8" stroke-width="3"/>
  <ellipse cx="200" cy="200" rx="98" ry="20" fill="#f3efe4"/>
  <!-- rice base -->
  <ellipse cx="200" cy="194" rx="96" ry="19" fill="#fbf8ef"/>
  <!-- greens -->
  <circle cx="148" cy="190" r="15" fill="#5fb15a"/>
  <circle cx="168" cy="198" r="13" fill="#7cc36f"/>
  <circle cx="250" cy="196" r="14" fill="#5fb15a"/>
  <!-- grilled chicken pieces -->
  <rect x="178" y="176" width="34" height="22" rx="7" fill="#cf8a3f"/>
  <rect x="206" y="186" width="32" height="20" rx="7" fill="#d99a4f"/>
  <rect x="160" y="184" width="28" height="18" rx="6" fill="#c47e35"/>
  <!-- grill marks -->
  <line x1="184" y1="182" x2="206" y2="190" stroke="#a9651f" stroke-width="2"/>
  <line x1="190" y1="178" x2="208" y2="184" stroke="#a9651f" stroke-width="2"/>
  <!-- cherry tomatoes -->
  <circle cx="232" cy="184" r="9" fill="#e2493b"/>
  <circle cx="144" cy="200" r="8" fill="#e2493b"/>
  <!-- sesame -->
  <circle cx="200" cy="196" r="2" fill="#caa45a"/>
  <circle cx="218" cy="200" r="2" fill="#caa45a"/>
  <circle cx="176" cy="204" r="2" fill="#caa45a"/>
</svg>
